services:
  - type: web
    name: ai-court-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-court-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ai-court-redis
          property: connectionString
      - key: FRONTEND_ORIGIN
        sync: false
      - key: PDF_BASE_URL
        sync: false
      - key: PDF_STORAGE_PATH
        value: /tmp/ai-court/pdfs
      - key: LLM_MODE
        value: mock
      - key: EMBEDDING_DIMENSIONS
        value: "1536"
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: TRIAL_STEP_DELAY_MS
        value: "450"

  - type: keyvalue
    name: ai-court-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
    maxmemoryPolicy: noeviction

databases:
  - name: ai-court-db
    databaseName: ai_court
    user: ai_court
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
