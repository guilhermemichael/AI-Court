services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_court_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_court
      POSTGRES_USER: ai_court
      POSTGRES_PASSWORD: ai_court
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_court -d ai_court"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ai_court_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    container_name: ai_court_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/storage/pdfs:/app/storage/pdfs
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    container_name: ai_court_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend:/app
    command: ["celery", "-A", "app.infrastructure.queue.celery_app.celery_app", "worker", "--loglevel=info"]

  frontend:
    build:
      context: ./frontend
    container_name: ai_court_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_BASE_URL: ws://localhost:8000
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

volumes:
  postgres_data:
  redis_data:
